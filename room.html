<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Details</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <h2>🌅 Sunrise Hotels</h2>
</header>

<!-- 🔥 Room Details -->
<section class="room-container" id="room-details"></section>

<script>
const params = new URLSearchParams(window.location.search);
const hotel = params.get("hotel");

let content = "";

if(hotel === "Luxury Palace") {
  content = `
  <div class="room-card">
    <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
    
    <h2>Luxury Palace Hotel</h2>
    <p>⭐⭐⭐⭐⭐ Banjara Hills, Hyderabad</p>

    <div class="gallery">
      <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
      <img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
      <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
    </div>

    <p class="price">₹3500 / night</p>

    <ul>
      <li>✔ AC Room</li>
      <li>✔ Free WiFi</li>
      <li>✔ Breakfast Included</li>
      <li>✔ Swimming Pool</li>
    </ul>

    <a href="booking.html"><button>Book Now</button></a>
  </div>
  `;
}

else if(hotel === "Royal Stay") {
  content = `
  <div class="room-card">
    <img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
    
    <h2>Royal Stay Inn</h2>
    <p>⭐⭐⭐⭐⭐ Hitech City, Hyderabad</p>

    <div class="gallery">
      <img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
      <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
      <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
    </div>

    <p class="price">₹2800 / night</p>

    <ul>
      <li>✔ Luxury Room</li>
      <li>✔ Pool Access</li>
      <li>✔ Free WiFi</li>
      <li>✔ Parking</li>
    </ul>

    <a href="booking.html"><button>Book Now</button></a>
  </div>
  `;
}

document.getElementById("room-details").innerHTML = content;
</script>

</body>
</html>
