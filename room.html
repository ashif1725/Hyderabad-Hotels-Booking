<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Details</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <h2>🏨 Hyderabad Hotel Booking</h2>
</header>

<div id="room"></div>

<script>
const params = new URLSearchParams(window.location.search);
const hotel = params.get("hotel");

let data = "";

if(hotel === "Luxury Palace") {
data = `
<div class="room-card">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
<h2>Luxury Palace Deluxe Room</h2>
<p>⭐⭐⭐⭐⭐ Premium Stay</p>
<p class="price">₹3500 / night</p>
<ul>
<li>✔ AC Room</li>
<li>✔ Free WiFi</li>
<li>✔ Breakfast</li>
<li>✔ Pool Access</li>
</ul>
<a href="booking.html"><button>Book Now</button></a>
</div>`;
}

if(hotel === "Royal Stay") {
data = `
<div class="room-card">
<img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
<h2>Royal Stay Deluxe Room</h2>
<p>⭐⭐⭐⭐⭐ Luxury Stay</p>
<p class="price">₹2800 / night</p>
<ul>
<li>✔ AC Room</li>
<li>✔ Free WiFi</li>
<li>✔ Parking</li>
</ul>
<a href="booking.html"><button>Book Now</button></a>
</div>`;
}

document.getElementById("room").innerHTML = data;
</script>

</body>
</html>
