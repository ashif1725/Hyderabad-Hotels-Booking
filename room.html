<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Details</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <h2>🌅 Sunrise Hotels</h2>
</header>

<div id="room"></div>

<script>
const params = new URLSearchParams(window.location.search);
const hotel = params.get("hotel");

let data = "";

if(hotel === "Luxury Palace") {
  data = `
  <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
  <h2>Luxury Palace Hotel</h2>
  <p>₹3500/night</p>
  <a href="booking.html?hotel=Luxury Palace"><button>Book Now</button></a>
  `;
}

if(hotel === "Royal Stay") {
  data = `
  <img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
  <h2>Royal Stay Inn</h2>
  <p>₹2800/night</p>
  <a href="booking.html?hotel=Royal Stay"><button>Book Now</button></a>
  `;
}

if(hotel === "Green Leaf") {
  data = `
  <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
  <h2>Green Leaf Resort</h2>
  <p>₹2200/night</p>
  <a href="booking.html?hotel=Green Leaf"><button>Book Now</button></a>
  `;
}

document.getElementById("room").innerHTML = data;
</script>

</body>
</html>
