
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Details</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <h2>🌅 Sunrise Hotels</h2>
</header>

<section id="room-details"></section>

<script>
const params = new URLSearchParams(window.location.search);
const hotel = params.get("hotel");

let content = "";

if(hotel === "Luxury Palace") {
  content = `
    <h2>Luxury Palace Hotel</h2>
    <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945" style="width:100%">
    <p>Price: ₹3500/night</p>
    <p>AC Room, Free WiFi, Breakfast Included</p>
    <a href="booking.html"><button>Book Now</button></a>
  `;
}

else if(hotel === "Royal Stay") {
  content = `
    <h2>Royal Stay Inn</h2>
    <img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa" style="width:100%">
    <p>Price: ₹2800/night</p>
    <p>Luxury Room, Pool, Free WiFi</p>
    <a href="booking.html"><button>Book Now</button></a>
  `;
}

document.getElementById("room-details").innerHTML = content;
</script>

</body>
</html>
