<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Details</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <h2>🏨 Lemon Tree Hotel</h2>
</header>

<div id="room"></div>

<script>
const params = new URLSearchParams(window.location.search);
const room = params.get("room");

let data = "";

// DELUXE ROOM
if(room === "deluxe") {
data = `
<div class="room-card">
<h2>Deluxe Room</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
<img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
<img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb210b5">
</div>

<p class="price">₹3500 / night</p>

<ul>
<li>✔ King Size Bed</li>
<li>✔ AC + WiFi</li>
<li>✔ Breakfast Included</li>
<li>✔ Smart TV</li>
<li>✔ Room Service</li>
</ul>

<a href="booking.html"><button>Book Now</button></a>
</div>`;
}

// FAMILY ROOM
if(room === "family") {
data = `
<div class="room-card">
<h2>Family Room</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
<img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb210b5">
</div>

<p class="price">₹4500 / night</p>

<ul>
<li>✔ 2 Beds</li>
<li>✔ AC + WiFi</li>
<li>✔ Family Space</li>
<li>✔ TV + Sofa</li>
</ul>

<a href="booking.html"><button>Book Now</button></a>
</div>`;
}

// SUITE ROOM
if(room === "suite") {
data = `
<div class="room-card">
<h2>Suite Room</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
<img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
<img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb210b5">
</div>

<p class="price">₹6500 / night</p>

<ul>
<li>✔ Luxury Suite</li>
<li>✔ Living Area</li>
<li>✔ Bathtub</li>
<li>✔ Premium Service</li>
</ul>

<a href="booking.html"><button>Book Now</button></a>
</div>`;
}

document.getElementById("room").innerHTML = data;
</script>

</body>
</html>
