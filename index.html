
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Stay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Poppins', sans-serif;
}

/* NAVBAR */
.navbar{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  color:white;
  z-index:100;
}

.navbar h2{
  font-weight:700;
}

/* HERO */
.hero{
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1501117716987-c8e1ecb210d9') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

.hero h1{
  font-size:65px;
}

.hero p{
  margin-top:10px;
  font-size:20px;
}

/* BOOKING BOX */
.booking{
  background:white;
  padding:20px;
  border-radius:10px;
  position:absolute;
  bottom:-40px;
  display:flex;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.booking input, .booking button{
  padding:10px;
  border:none;
  outline:none;
}

.booking button{
  background:black;
  color:white;
  cursor:pointer;
}

/* HOTELS */
.section{
  padding:100px 50px;
}

.hotels{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.price{
  color:#ff6600;
  font-weight:bold;
}

.btn{
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:black;
  color:white;
  text-decoration:none;
  border-radius:5px;
}

/* FOOTER */
.footer{
  background:black;
  color:white;
  text-align:center;
  padding:20px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>LuxuryStay</h2>
  <div>Home | Hotels | Contact</div>
</div>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Find Your Perfect Stay</h1>
    <p>Book luxury hotels at best price</p>

    <div class="booking">
      <input type="date">
      <input type="date">
      <input type="number" placeholder="Guests">
      <button onclick="bookNow()">Search</button>
    </div>
  </div>
</section>

<!-- HOTELS -->
<section class="section">
  <h2>Popular Hotels</h2>

  <div class="hotels">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
      <div class="card-content">
        <h3>Luxury Palace</h3>
        <p class="price">₹3500 / Night</p>
        <a href="#" class="btn" onclick="bookNow()">Book Now</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4">
      <div class="card-content">
        <h3>Royal Grand</h3>
        <p class="price">₹5000 / Night</p>
        <a href="#" class="btn" onclick="bookNow()">Book Now</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
      <div class="card-content">
        <h3>Trident Style</h3>
        <p class="price">₹7000 / Night</p>
        <a href="#" class="btn" onclick="bookNow()">Book Now</a>
      </div>
    </div>

  </div>
</section>

<!-- FOOTER -->
<div class="footer">
  © 2026 LuxuryStay | All Rights Reserved
</div>

<script>
function bookNow(){
  window.location.href = "https://wa.me/919876543210";
}
</script>

</body>
</html>
