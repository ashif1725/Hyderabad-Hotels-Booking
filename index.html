
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Hotel Booking</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f5f5;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1566073771259-6a8506099945') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
  letter-spacing: 2px;
}

.hero p {
  font-size: 20px;
  margin-top: 10px;
}

/* HOTELS */
.container {
  padding: 60px;
}

.container h2 {
  text-align: center;
  margin-bottom: 40px;
  font-size: 35px;
}

.hotels {
  display: flex;
  gap: 30px;
  justify-content: center;
  flex-wrap: wrap;
}

/* CARD */
.card {
  width: 320px;
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* CONTENT */
.card-content {
  padding: 20px;
}

.card-content h3 {
  margin: 0;
  font-size: 22px;
}

.card-content p {
  margin: 10px 0;
  color: #555;
}

/* BUTTONS */
.btn {
  display: inline-block;
  padding: 10px 15px;
  margin-top: 10px;
  text-decoration: none;
  border-radius: 5px;
  font-size: 14px;
}

.call {
  background: black;
  color: white;
}

.whatsapp {
  background: green;
  color: white;
  margin-left: 10px;
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>TRIDENT STYLE HOTELS</h1>
    <p>Experience Luxury & Comfort</p>
  </div>
</section>

<!-- HOTELS -->
<div class="container">
  <h2>Our Premium Hotels</h2>

  <div class="hotels">

    <!-- HOTEL 1 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa">
      <div class="card-content">
        <h3>Sunrise Luxury</h3>
        <p>₹2500 / Night</p>
        <a href="tel:9876543210" class="btn call">Call</a>
        <a href="https://wa.me/919876543210" class="btn whatsapp">WhatsApp</a>
      </div>
    </div>

    <!-- HOTEL 2 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4">
      <div class="card-content">
        <h3>Trident Palace</h3>
        <p>₹4000 / Night</p>
        <a href="tel:9876543210" class="btn call">Call</a>
        <a href="https://wa.me/919876543210" class="btn whatsapp">WhatsApp</a>
      </div>
    </div>

    <!-- HOTEL 3 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb210d9">
      <div class="card-content">
        <h3>Royal Grand</h3>
        <p>₹6000 / Night</p>
        <a href="tel:9876543210" class="btn call">Call</a>
        <a href="https://wa.me/919876543210" class="btn whatsapp">WhatsApp</a>
      </div>
    </div>

  </div>
</div>

</body>
</html>
