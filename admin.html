
<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
input,button{padding:10px;margin:5px}
.card{background:white;padding:10px;margin:10px 0}
</style>
</head>

<body>

<h2>Admin Panel - Add Room</h2>

<input type="text" id="name" placeholder="Room Name">
<input type="text" id="price" placeholder="Price">
<input type="text" id="img" placeholder="Image URL">

<button onclick="addRoom()">Add Room</button>

<h3>All Rooms</h3>
<div id="list"></div>

<script>
let rooms = JSON.parse(localStorage.getItem("rooms")) || [];

function addRoom(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let img = document.getElementById("img").value;

  rooms.push({name,price,img});
  localStorage.setItem("rooms", JSON.stringify(rooms));
  showRooms();
}

function deleteRoom(index){
  rooms.splice(index,1);
  localStorage.setItem("rooms", JSON.stringify(rooms));
  showRooms();
}

function showRooms(){
  let html="";
  rooms.forEach((r,i)=>{
    html+=`
    <div class="card">
      <b>${r.name}</b> - ₹${r.price}
      <button onclick="deleteRoom(${i})">Delete</button>
    </div>`;
  });
  document.getElementById("list").innerHTML=html;
}

showRooms();
</script>

</body>
</html>
