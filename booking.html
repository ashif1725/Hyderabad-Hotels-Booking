<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <h2>🌅 Sunrise Hotels</h2>
</header>

<form onsubmit="sendWhatsApp(); return false;">

<input type="text" id="name" placeholder="Your Name" required><br><br>
<input type="tel" id="phone" placeholder="Your Phone" required><br><br>

<button type="submit">Confirm Booking</button>

</form>

<script>
function sendWhatsApp() {
  var name = document.getElementById("name").value;
  var phone = document.getElementById("phone").value;

  var message = "New Booking:%0AName: " + name + "%0APhone: " + phone;

  var url = "https://wa.me/919876543210?text=" + message;
  window.open(url, "_blank");
}
</script>

</body>
</html>
